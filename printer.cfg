## Includes
# --------------------------------------------------------------------
# Macros
[include macros/*.cfg]

# Boards and Hardware
[include hardware/beacon.cfg]
[include hardware/LDOLeviathan.cfg]
[include hardware/LDONH36.cfg]
[include hardware/steppers.cfg]
[include hardware/bed.cfg]
[include hardware/extruder.cfg]

# Plugins
#[include plugins/tmc_autotune.cfg]
[include plugins/shaketune.cfg]


[save_variables]
filename: ~/printer_data/config/variables.cfg

## Mainboard - Leviathan v1.3
[mcu]
# UART Mode
serial: /dev/ttyAMA0
baud: 250000
restart_method: command

## Toolhead Board - Nighthawk 36
##--------------------------------------------------------------------
[mcu thb]
serial: /dev/serial/by-id/usb-Klipper_rp2040_303339383405578E-if00
restart_method: command

## rPi 
#[mcu rpi]
#serial: /tmp/klipper_host_mcu

# Support for per object cancellation
[exclude_object]

###########
# WEB GUI #
###########

# Mainsail 
[include mainsail.cfg]


[printer]
kinematics: corexy
max_velocity: 200  
max_accel: 10000   
max_z_velocity: 25 			
max_z_accel: 350
square_corner_velocity: 5

#######################
# Temperature Sensors #
#######################

#[temperature_sensor Leviathan]
#sensor_type: temperature_mcu

[temperature_sensor Pi]
sensor_type: temperature_host

[temperature_sensor NH36]
sensor_type: temperature_mcu
sensor_mcu: thb
min_temp: -20 
max_temp: 100

[temperature_sensor Chamber_Front_Right]
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: MCU_T3
pullup_resistor: 2200

#[temperature_sensor _Chamber_L]
#sensor_type: NTC100K B3950
#sensor_pin: PF6
#max:

#[temperature_sensor Chamber]
#sensor_type: temperature_combined
#sensor_list: temperature_sensor _Chamber_R, temperature_sensor _Chamber_L
#combination_method: mean
#maximum_deviation: 500

########
# ADXL #
########

[adxl345]
cs_pin: thb:ADXL_CS
spi_software_sclk_pin: thb:ADXL_SCLK
spi_software_mosi_pin: thb:ADXL_MOSI
spi_software_miso_pin: thb:ADXL_MISO
#axes_map: x,y,z
axes_map: -x, -z, -y

[resonance_tester]
accel_chip: beacon
#accel_chip: adxl345
accel_per_hz: 75 # was 150
probe_points: 87,90,20
max_freq: 150
sweeping_period: 1


## # Wihtout TMC Autotune
[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 70.8
damping_ratio_x: 0.056

shaper_type_y: ei
shaper_freq_y: 94.4
damping_ratio_y: 0.033

# With TMC Autotune
#[input_shaper]
#shaper_type_x: mzv
#shaper_freq_x: 72.2
#damping_ratio_x: 0.057
#
#shaper_type_y: mzv
#shaper_freq_y: 85.0 
#damping_ratio_y: 0.039

[skew_correction]




###############
# Fan Control #
###############

[fan]
##	Part Cooling Fan
pin: thb:PC_FAN
kick_start_time: 0.5
##	Depending on your fan, you may need to increase this value
##	if your fan will not start. Can change cycle_time (increase)
##	if your fan is not able to slow down effectively
#off_below: 0.10
min_power: 0

[heater_fan hotend]
pin: thb:HE_FAN
heater: extruder
heater_temp: 75.0 # was 50
kick_start_time: 0.5
max_power: 1.0
tachometer_pin: thb:HE_TACH  #Uncomment for Tach on NH36

[controller_fan electronics_bay_exhaust]
pin: MCU_FAN
max_power: 1.0
kick_start_time: 0.1
fan_speed: 1.0
idle_speed: 0.25
tachometer_pin: ^MCU_FAN0_TACHO
tachometer_ppr: 2
tachometer_poll_interval: 0.0010

[controller_fan electronics_bay_supply]
pin: MCU_FAN3
max_power: 1.0
kick_start_time: 0.1
fan_speed: 1.0
idle_speed: 0.25
tachometer_pin: ^MCU_FAN3_TACHO
tachometer_ppr: 2
tachometer_poll_interval: 0.0010

###############
# LED Control #
###############

# Chamber Daylight on Matchstick
[led Chamber]
white_pin: CHAMBER_LED
initial_WHITE: 0.1
hardware_pwm: false
cycle_time: 0.01

# Nitehawk RGB
[neopixel Toolhead]
pin: thb:RGB        
chain_count: 3         # 1 in front, 2 as nozzle lights
color_order: GRBW      # LDO neopixel is GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0

#################
# Carbon Filter #
#################
[fan_generic filter]
pin: FILTER_FAN

###################
# Bed Fan Control #
###################
[heater_generic chamber]
heater_pin: BED_FAN
sensor_type: Generic 3950
#sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: CHAMBER_TEMP
control: pid
pid_Kp: 61.470837
pid_Ki: 0.5
pid_Kd: 0
pwm_cycle_time: 0.3
min_temp: -273.15
max_temp: 75
gcode_id: C
pullup_resistor: 2200

[verify_heater chamber]
max_error: 120
check_gain_time: 120
hysteresis: 50
heating_gain: 1

#########################################
# Homing and Gantry Adjustment Routines #
#########################################

[idle_timeout]
timeout: 1800
gcode:
    SCREEN_OFF
    M18
    
[quad_gantry_level]
speed: 100
horizontal_move_z: 5
retries: 5
retry_tolerance: 0.0075
max_adjust: 10

#--------------------------------------------------------------------

##  Gantry Corners for 180 Build
gantry_corners:
   -60.2,-10.4
   244.1,234.5
##  Probe points
points:
  13,1
  13,140
  160,140
  160,1

