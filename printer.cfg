## Includes
# --------------------------------------------------------------------
# Macros
[include macros/*.cfg]

# Boards
[include hardware/beacon.cfg]
[include hardware/LDOLeviathan.cfg]
[include hardware/LDONH36.cfg]

## Mainboard - Leviathan v1.3
[mcu]
# UART Mode
serial: /dev/ttyAMA0
baud: 250000
restart_method: command

## Toolhead Board - Nighthawk 36
##--------------------------------------------------------------------
[mcu thb]
serial: /dev/serial/by-id/usb-Klipper_rp2040_303339383405578E-if00
restart_method: command

## rPi 
#[mcu rpi]
#serial: /tmp/klipper_host_mcu

# Support for per object cancellation
[exclude_object]

###########
# WEB GUI #
###########

# Mainsail 
[include mainsail.cfg]


[printer]
kinematics: corexy
max_velocity: 200  
max_accel: 5000    			#This can be adjusted after you run Input Shaper calibration
max_z_velocity: 25 			
max_z_accel: 350
square_corner_velocity: 5

#######################
# Temperature Sensors #
#######################

#[temperature_sensor Leviathan]
#sensor_type: temperature_mcu

[temperature_sensor Pi]
sensor_type: temperature_host

[temperature_sensor NH36]
sensor_type: temperature_mcu
sensor_mcu: thb
min_temp: -20 
max_temp: 100

[temperature_sensor Chamber_Front_Right]
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: MCU_T3
pullup_resistor: 2200

#[temperature_sensor _Chamber_L]
#sensor_type: NTC100K B3950
#sensor_pin: PF6
#max:

#[temperature_sensor Chamber]
#sensor_type: temperature_combined
#sensor_list: temperature_sensor _Chamber_R, temperature_sensor _Chamber_L
#combination_method: mean
#maximum_deviation: 500


################
# X/Y Steppers #
################

## X Stepper on Motor1(B Motor)
[stepper_x]
step_pin: X_STEP
dir_pin: !X_DIR
enable_pin: !X_EN
rotation_distance: 32
microsteps: 32
full_steps_per_rotation:200 #400 for 0.9 deg steppers 
position_min: 0
homing_positive_dir: true
homing_speed: 60   
##  Uncomment if using endstop switches
endstop_pin: ^thb:X_ENDSTOP
homing_retract_dist: 5

##--------------------------------------------------------------------

##  Uncomment for 180 build
position_endstop: 173
position_max: 173

##--------------------------------------------------------------------


###########################
#	Uncomment for Leviathan #
###########################

[tmc5160 stepper_x]
cs_pin: X_CS
spi_bus: spi4
interpolate: false
run_current: 0.8
sense_resistor: 0.075

## Y Stepper on Motor2 (A Motor)
[stepper_y]
step_pin: Y_STEP
dir_pin: !Y_DIR
enable_pin: !Y_EN
rotation_distance: 32
microsteps: 32
full_steps_per_rotation:200 #400 for 0.9 deg steppers 
position_min: 0
homing_positive_dir: true
homing_speed: 60
endstop_pin: ^MCU_STOP_Y_ENDSTOP
homing_retract_dist: 5

##--------------------------------------------------------------------

##  Uncomment for 180 build
position_endstop: 190
position_max: 190

##--------------------------------------------------------------------

###########################
#	Uncomment for Leviathan #
###########################

[tmc5160 stepper_y]
cs_pin: Y_CS
spi_bus: spi4
interpolate: false
run_current: 0.8
sense_resistor: 0.075


##############
# Z Steppers #
##############

## Z0 Stepper - Front Left 
[stepper_z]
step_pin: Z_STEP
dir_pin: !Z_DIR
enable_pin: !Z_EN
rotation_distance: 32
gear_ratio: 64:16
microsteps: 32
endstop_pin: probe:z_virtual_endstop # use beacon as virtual endstop
position_max: 150 #165 is original
position_min: -5
homing_speed: 8
second_homing_speed: 3 
homing_retract_dist: 0 # beacon needs this to be set to 0

[tmc2209 stepper_z]
uart_pin: Z_UART
interpolate: true
run_current: 0.8
sense_resistor: 0.110

##	Z1 Stepper - Rear Left 
[stepper_z1]
step_pin: Z1_STEP
dir_pin: Z1_DIR
enable_pin: !Z1_EN
rotation_distance: 32
gear_ratio: 64:16
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: Z1_UART
interpolate: true
run_current: 0.8
sense_resistor: 0.110

##	Z2 Stepper - Rear Right 
[stepper_z2]
step_pin: Z2_STEP
dir_pin: !Z2_DIR
enable_pin: !Z2_EN
rotation_distance: 32
gear_ratio: 64:16
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: Z2_UART
interpolate: true
run_current: 0.8
sense_resistor: 0.110

##	Z3 Stepper - Front Right 
[stepper_z3]
step_pin: Z3_STEP
dir_pin: Z3_DIR
enable_pin: !Z3_EN
rotation_distance: 32
gear_ratio: 64:16
microsteps: 32

[tmc2209 stepper_z3]
uart_pin: Z3_UART
interpolate: true
run_current: 0.8
sense_resistor: 0.110

########
# ADXL #
########

[adxl345]
cs_pin: thb:ADXL_CS
spi_software_sclk_pin: thb:ADXL_SCLK
spi_software_mosi_pin: thb:ADXL_MOSI
spi_software_miso_pin: thb:ADXL_MISO
axes_map: x,y,z

[resonance_tester]
accel_chip: beacon
#accel_chip: adxl345
accel_per_hz: 150
probe_points: 87,90,20
max_freq: 150
sweeping_period: 0


############
# Extruder #
############

[extruder]
step_pin: thb:E_STEP
dir_pin: !thb:E_DIR
enable_pin: !thb:E_EN
microsteps: 16
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: thb:HE_HEATER
#sensor_type: Generic 3950
sensor_type: ATC Semitec 104NT-4-R025H42G # Revo HF
pullup_resistor: 2200
sensor_pin: thb:HE_TEMP
control: pid
pid_kp = 24.320
pid_ki = 2.904
pid_kd = 50.921
min_temp: 0
max_temp: 300
microsteps: 16
full_steps_per_rotation: 200	# 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.75
pressure_advance: 0.05
pressure_advance_smooth_time: 0.040 # this can be calibrated later
rotation_distance: 47.088 
gear_ratio: 9:1
max_extrude_only_distance: 200

[pid_profile extruder 260]
pid_version = 1
pid_target = 260.00
pid_tolerance = 0.0200
control = pid
pid_kp = 24.320
pid_ki = 2.904
pid_kd = 50.921

[tmc2209 extruder]
uart_pin: thb:E_UART
run_current: 0.650
sense_resistor: .100

#################################
# Filament Sensors
#################################
[filament_switch_sensor filament_upper]
switch_pin: thb:FS
pause_on_runout: True
#runout_gcode:
#    M117 Upper Filament Runout
#    PAUSE
#insert_gcode:
#    M117 Upper Filament Inserted
#    PAUSE
insert_gcode:
  {% set OriginalState = printer.print_stats.state %}
  {% if not (OriginalState == "paused" or OriginalState == "printing") %}
    RESPOND MSG="Filament inserted"
    _LOW_TEMP_CHECK
    _PRELOAD_FILAMENT_START
  {% endif %} 
runout_gcode:
 {% set CURRENT_ACCEL = printer.toolhead.max_accel %} 
 {% set CURRENT_TEMP = printer['extruder'].target %} 
 {% set OriginalState = printer.print_stats.state %}
 {% if OriginalState == "printing" and printer['filament_switch_sensor filament_lower'].filament_detected and not printer['filament_switch_sensor filament_upper'].filament_detected %}
   PAUSE
   RESPOND TYPE=error msg="FILAMENT RUNOUT !!"
   _FS_DISABLE
   _UNLOAD_FILAMENT_START
   _FS_ENABLE
 {% endif %}

[filament_switch_sensor filament_lower]
switch_pin: thb:PROBE
pause_on_runout: False
#runout_gcode:
#    M117 Lower Filament Runout
#    PAUSE
#insert_gcode:
#    M117 Lower Filament Inserted


