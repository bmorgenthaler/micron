#PID parameters for 60.00°C: pid_Kp=14.163 pid_Ki=0.287 pid_Kd=174.737

########################
# Dual Loop Bed Heater #
########################
[temperature_sensor bed_inner]
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: BED_TEMP_INNER   # Inner Loop: Heater Mat (Fast), under the mat
pullup_resistor: 2200        # For the Leviathan
min_temp: 0
max_temp: 135                # Safety limit for the heater mat itself
                             # If the bed heater mat (BED_TEMP_INNER)
							 # temp exceeds this, Klipper shuts down.  
							 # Must be higher than inner_max_temp to 
							 # allow inner_max_temp to overshoot a bit
                             
[heater_bed]
heater_pin: BED_HEATER
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: BED_TEMP_OUTER   # Outer Loop: Aluminum Plate (Slow)
                             # This is the sensor in the aluminum bed
							 # It will always lag the bed heater sensor
pullup_resistor: 2200        # For the Leviathan
max_power: 1.0
min_temp: 0
max_temp: 140                # This is simply the maximum temperature
                             # you can use in normal operation

control: dual_loop_pid
inner_sensor_name: bed_inner

inner_max_temp: 115.0        # Safety limit for the inner control loop
                             # This is where the heater control loop
                             # will stabilize while waiting for the 
        					 # outer loop to settle.
        					 # It must be less than than the max temp
        					 # for the heating mat (135 in this example)
        					 # But high enough for the target temp to be reached
        					 # Example:  For bed to settle at 110C, the heating pad
        					 # has to settle to 119.2C.  If this was set to 115, 
        					 # the bed temp would never reach 110C because there's
        					 # about a 9C drop between heater pad temp and actual
        					 # bed temp

# --- Outer Loop (Controls the Plate Temp) ---
# Safe, slow values for the thick aluminum plate.
# (We don't need to calibrate this perfectly because the inner loop is now tuned to prevent "runaway")
pid_kp: 58.437
pid_ki: 2.347
pid_kd: 363.769


# --- Inner Loop (Controls the Heater Power) ---
inner_pid_Kp=17.717
inner_pid_Ki=0.114
inner_pid_Kd=689.860




