[cam 1]
mode: ustreamer                         # https://docs.mainsail.xyz/crowsnest/faq/backends
port: 8081                              # HTTP/MJPG stream/snapshot port
device: /dev/v4l/by-id/usb-16MP_Camera_Mamufacture_16MP_USB_Camera_2022050701-video-index0
resolution: 1280x720                    # <width>x<height> format
max_fps: 30                             # If hardware supports it, it will be forced, otherwise ignored/coerced.
#custom_flags:                          # You can run the stream services with custom flags.
#v4l2ctl: auto_exposure=1,exposure_time_absolute=320,sharpness=60,contrast=18,gamma=90,brightness=0
