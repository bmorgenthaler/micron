[tmc2209 extruder]
uart_pin: thb:E_UART
run_current: 0.650
sense_resistor: .100

#################################
# Filament Sensors
#################################
[filament_switch_sensor filament_upper]
switch_pin: thb:FS
pause_on_runout: False              # CHANGED from True: runout_gcode handles PAUSE explicitly.
                                    # Original True caused double-pause (built-in + PAUSE in runout_gcode).
insert_gcode:
  _INSERT_HANDLER
runout_gcode:
  _RUNOUT_HANDLER
 
[filament_switch_sensor filament_lower]
switch_pin: thb:PROBE
pause_on_runout: False              # Unchanged — safety net handler in runout_gcode instead.
runout_gcode:                       # ADDED: safety net if upper sensor is bypassed (e.g. mid-path break).
  _LOWER_RUNOUT_HANDLER
