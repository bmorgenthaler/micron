################
# X/Y Steppers #
################

## X Stepper — Motor1 (B Motor)
[stepper_x]
step_pin: X_STEP
dir_pin: !X_DIR
enable_pin: !X_EN
rotation_distance: 32
microsteps: 32
full_steps_per_rotation: 200        # 400 for 0.9° steppers
position_min: 0
position_endstop: 173
position_max: 173
homing_positive_dir: true
homing_speed: 60
endstop_pin: ^thb:X_ENDSTOP
homing_retract_dist: 5

[tmc5160 stepper_x]
cs_pin: X_CS
spi_bus: spi4
interpolate: false
run_current: 0.8
sense_resistor: 0.075

## Y Stepper — Motor2 (A Motor)
[stepper_y]
step_pin: Y_STEP
dir_pin: !Y_DIR
enable_pin: !Y_EN
rotation_distance: 32
microsteps: 32
full_steps_per_rotation: 200        # 400 for 0.9° steppers
position_min: 0
position_endstop: 190
position_max: 190
homing_positive_dir: true
homing_speed: 60
endstop_pin: ^MCU_STOP_Y_ENDSTOP
homing_retract_dist: 5

[tmc5160 stepper_y]
cs_pin: Y_CS
spi_bus: spi4
interpolate: false
run_current: 0.8
sense_resistor: 0.075

##############
# Z Steppers #
##############

## Z0 — Front Left
[stepper_z]
step_pin: Z_STEP
dir_pin: !Z_DIR
enable_pin: !Z_EN
rotation_distance: 32
gear_ratio: 64:16
microsteps: 32
endstop_pin: probe:z_virtual_endstop  # Beacon virtual endstop
position_max: 150
position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 0              # Required for Beacon contact homing

[tmc2209 stepper_z]
uart_pin: Z_UART
interpolate: true
run_current: 0.8
sense_resistor: 0.110

