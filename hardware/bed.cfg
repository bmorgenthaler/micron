# Inner mat sensor — kept active for monitoring even under stock Klipper
[temperature_sensor bed_inner]
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: BED_TEMP_INNER   # Inner Loop: Heater Mat (Fast), under the mat
pullup_resistor: 2200        # For the Leviathan
min_temp: 0
max_temp: 135                # Safety limit for the heater mat itself

#[verify_heater heater_bed]
#check_gain_time: 120

#############################
# Stock Klipper Bed Heater  #
#############################
# Single-loop PID on the plate sensor (BED_TEMP_OUTER).
# Outer-loop PID values used as starting point; re-run PID_CALIBRATE after switch.
[heater_bed]
heater_pin: BED_HEATER
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: BED_TEMP_OUTER
pullup_resistor: 2200
max_power: 1.0
min_temp: 0
max_temp: 130
control: pid

pid_kp: 47.918
pid_ki: 2.986
pid_kd: 192.269
