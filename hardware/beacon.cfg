[beacon]
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_8055C19A5157383837202020FF052008-if00
speed: 5
lift_speed: 5
x_offset: 0
#y_offset: -20.656 # From Micron_R1 CAD to edge of beacon + 8.5 to center of zone from beacon CAD
#y_offset: 23 # Measured using https://www.printables.com/model/1060868-cartographer-probe-nozzle-offset-tool
y_offset: 21.2 # Original config
default_model_name: default
mesh_main_direction: x
mesh_runs: 2
default_probe_method: proximity
contact_max_hotend_temperature: 180 # increase to enable hot contacting

# new additions for beacon safe_z_home functionality
home_xy_position: 86, 91
home_z_hop: 5
home_z_hop_speed: 30
home_xy_move_speed: 100
home_method: contact
home_method_when_homed: proximity 
home_autocalibrate: never
home_gcode_post_x: _HOME_POST_AXIS AXIS=X
home_gcode_post_y: _HOME_POST_AXIS AXIS=Y

accel_axes_map: -x, -y, z


#[gcode_macro _HOME_POST_AXIS]
#gcode:
#    {% set axis = params.AXIS %}
#    {% set th = printer.toolhead %}
#    G90 
#    G0 {axis}90 F5000
#    G91
#    M400

# Claude Version
[gcode_macro _HOME_POST_AXIS]
gcode:
    {% set axis = params.AXIS %}
    {% if 'x' in printer.toolhead.homed_axes and 'y' in printer.toolhead.homed_axes %}
        G90
        G0 {axis}90 F5000
        G91
        M400
    {% endif %}

[gcode_macro QUAD_GANTRY_LEVEL]
rename_existing: _QUAD_GANTRY_LEVEL
description: Conform a moving, twistable gantry to the shape of a stationary bed 
gcode:
    {% if printer.quad_gantry_level.applied|lower == 'false' %}
      _QUAD_GANTRY_LEVEL RETRY_TOLERANCE=0.2
    {% endif %}
    _QUAD_GANTRY_LEVEL HORIZONTAL_MOVE_Z=2
    #DISPLAYTEXT TEXT="QGL Complete"
    SET_DISPLAY_TEXT MSG="QGL Complete"
    G28 Z

[bed_mesh]
speed: 120
horizontal_move_z: 10
mesh_min: 13,21.2
mesh_max: 160,160
#mesh_min: 13, 1
#mesh_max: 160, 122
probe_count: 20,20
algorithm: bicubic
fade_start: 1.0
fade_end: 10
mesh_pps: 2,2
