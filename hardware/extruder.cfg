############
# Extruder #
############

[extruder]
step_pin: thb:E_STEP
dir_pin: !thb:E_DIR
enable_pin: !thb:E_EN
microsteps: 16
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: thb:HE_HEATER
#sensor_type: Generic 3950
sensor_type: ATC Semitec 104NT-4-R025H42G # Revo HF
pullup_resistor: 2200
sensor_pin: thb:HE_TEMP
control: pid
pid_kp = 24.320
pid_ki = 2.904
pid_kd = 50.921
min_temp: 0
min_extrude_temp: 0
max_temp: 300
microsteps: 16
full_steps_per_rotation: 200	# 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.75
pressure_advance: 0.05
pressure_advance_smooth_time: 0.040 # this can be calibrated later
rotation_distance: 47.088 
gear_ratio: 9:1
max_extrude_only_distance: 200

[pid_profile extruder 260]
pid_version = 1
pid_target = 260.00
pid_tolerance = 0.0200
control = pid
pid_kp = 24.320
pid_ki = 2.904
pid_kd = 50.921

[tmc2209 extruder]
uart_pin: thb:E_UART
run_current: 0.650
sense_resistor: .100

#################################
# Filament Sensors
#################################
[filament_switch_sensor filament_upper]
switch_pin: thb:FS
pause_on_runout: True
#runout_gcode:
#    M117 Upper Filament Runout
#    PAUSE
#insert_gcode:
#    M117 Upper Filament Inserted
#    PAUSE
insert_gcode:
  {% set OriginalState = printer.print_stats.state %}
  {% if not (OriginalState == "paused" or OriginalState == "printing") %}
    RESPOND MSG="Filament inserted"
    _LOW_TEMP_CHECK
    _PRELOAD_FILAMENT_START
  {% endif %} 
runout_gcode:
 {% set CURRENT_ACCEL = printer.toolhead.max_accel %} 
 {% set CURRENT_TEMP = printer['extruder'].target %} 
 {% set OriginalState = printer.print_stats.state %}
 {% if OriginalState == "printing" and printer['filament_switch_sensor filament_lower'].filament_detected and not printer['filament_switch_sensor filament_upper'].filament_detected %}
   PAUSE
   RESPOND TYPE=error msg="FILAMENT RUNOUT !!"
   _FS_DISABLE
   _UNLOAD_FILAMENT_START
   _FS_ENABLE
 {% endif %}

[filament_switch_sensor filament_lower]
switch_pin: thb:PROBE
pause_on_runout: False
#runout_gcode:
#    M117 Lower Filament Runout
#    PAUSE
#insert_gcode:
#    M117 Lower Filament Inserted