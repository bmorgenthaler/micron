############
# Extruder #
############

[extruder]
step_pin: thb:E_STEP
dir_pin: !thb:E_DIR
enable_pin: !thb:E_EN
microsteps: 16
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: thb:HE_HEATER
#sensor_type: Generic 3950
sensor_type: ATC Semitec 104NT-4-R025H42G # Revo HF
pullup_resistor: 2200
sensor_pin: thb:HE_TEMP
control: pid
pid_kp = 24.320
pid_ki = 2.904
pid_kd = 50.921
min_temp: 0
min_extrude_temp: 0
max_temp: 300
microsteps: 16
full_steps_per_rotation: 200	# 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.75
pressure_advance: 0.05
pressure_advance_smooth_time: 0.040 # this can be calibrated later
rotation_distance: 47.088 
gear_ratio: 9:1
max_extrude_only_distance: 200

[pid_profile extruder 260]
pid_version = 1
pid_target = 260.00
pid_tolerance = 0.0200
control = pid
pid_kp = 24.320
pid_ki = 2.904
pid_kd = 50.921

[tmc2209 extruder]
uart_pin: thb:E_UART
run_current: 0.650
sense_resistor: .100

#################################
# Filament Sensors
#################################
[filament_switch_sensor filament_upper]
switch_pin: thb:FS
pause_on_runout: False              # CHANGED from True: runout_gcode handles PAUSE explicitly.
                                    # Original True caused double-pause (built-in + PAUSE in runout_gcode).
insert_gcode:
  _INSERT_HANDLER
runout_gcode:
  _RUNOUT_HANDLER
 
[filament_switch_sensor filament_lower]
switch_pin: thb:PROBE
pause_on_runout: False              # Unchanged — safety net handler in runout_gcode instead.
runout_gcode:                       # ADDED: safety net if upper sensor is bypassed (e.g. mid-path break).
  _LOWER_RUNOUT_HANDLER
