## Includes
# --------------------------------------------------------------------
# Macros
[include macros/*.cfg]

# Boards
[include boards/beacon.cfg]
[include boards/LDOLeviathan.cfg]
[include boards/LDONH36.cfg]

## Mainboard - Leviathan v1.3
[mcu]
# UART Mode
serial: /dev/ttyAMA0
baud: 250000
restart_method: command

## Toolhead Board - Nighthawk 36
##--------------------------------------------------------------------
[mcu thb]
serial: /dev/serial/by-id/usb-Klipper_rp2040_303339383405578E-if00
restart_method: command

[idle_timeout]
timeout: 900
gcode:
    SCREEN_OFF

###########
# WEB GUI #
###########

# Mainsail 
[include mainsail.cfg]


[printer]
kinematics: corexy
max_velocity: 200  
max_accel: 5000    			#This can be adjusted after you run Input Shaper calibration
max_z_velocity: 25 			
max_z_accel: 350
square_corner_velocity: 5

#######################
# Temperature Sensors #
#######################

#[temperature_sensor Leviathan]
#sensor_type: temperature_mcu

[temperature_sensor Pi]
sensor_type: temperature_host

[temperature_sensor NH36]
sensor_type: temperature_mcu
sensor_mcu: thb
min_temp: -20 
max_temp: 100


############################
# Inner Bed Thermistor
# (Underside / heater mat)
############################
[temperature_sensor bed_inner]
sensor_type: Generic 3950
sensor_pin: BED_TEMP_INNER
min_temp: -20
max_temp: 140
pullup_resistor: 2200


################
# X/Y Steppers #
################

## X Stepper on Motor1(B Motor)
[stepper_x]
step_pin: X_STEP
dir_pin: !X_DIR
enable_pin: !X_EN
rotation_distance: 32
microsteps: 32
full_steps_per_rotation:200 #400 for 0.9 deg steppers 
position_min: 0
homing_positive_dir: true
homing_speed: 60   
##  Uncomment if using endstop switches
endstop_pin: ^thb:X_ENDSTOP
homing_retract_dist: 5

##--------------------------------------------------------------------

##  Uncomment for 180 build
position_endstop: 173
position_max: 173

##--------------------------------------------------------------------


###########################
#	Uncomment for Leviathan #
###########################

[tmc5160 stepper_x]
cs_pin: X_CS
spi_bus: spi4
interpolate: false
run_current: 0.8
sense_resistor: 0.075

## Y Stepper on Motor2 (A Motor)
[stepper_y]
step_pin: Y_STEP
dir_pin: !Y_DIR
enable_pin: !Y_EN
rotation_distance: 32
microsteps: 32
full_steps_per_rotation:200 #400 for 0.9 deg steppers 
position_min: 0
homing_positive_dir: true
homing_speed: 60  
##  Uncomment if using endstop switches
