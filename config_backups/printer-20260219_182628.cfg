gcode:
  SET_FAN_SPEED FAN=filter SPEED=0

[gcode_macro TOGGLE_FILTER]
gcode:
  {% if printer['fan_generic filter'].speed > 0 %}
    SET_FAN_SPEED FAN=filter SPEED=0
  {% else %}
    SET_FAN_SPEED FAN=filter SPEED=1
  {% endif %}

###################
# Bed Fan Control #
###################

[heater_generic chamber]
heater_pin: BED_FAN
sensor_type: Generic 3950
#sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: CHAMBER_TEMP
control: pid
pid_Kp: 61.470837
pid_Ki: 0.5
pid_Kd: 0
pwm_cycle_time: 0.3
min_temp: -273.15
max_temp: 75
gcode_id: C
###########################
#	Uncomment for Leviathan #
###########################
pullup_resistor: 2200

[verify_heater chamber]
max_error: 120
check_gain_time: 120
hysteresis: 50
heating_gain: 1

[gcode_macro SET_CHAMBER]
gcode:
  {% set target_chamber = params.CHAMBER_TEMP|default(0)|float %}
  SET_HEATER_TEMPERATURE heater=chamber target={target_chamber}

[gcode_macro HEATSOAK_CHAMBER]
gcode:
    {% set target_chamber = params.CHAMBER_TEMP|default(0)|float %}
    SET_DISPLAY_TEXT MSG="Heatsoak: {target_chamber}c"  # Display info on display
    {% if target_chamber > 0 and not printer["heater_generic chamber"].temperature >= target_chamber|float%} #wait for chamber temps
        SET_CHAMBER CHAMBER_TEMP={target_chamber+1} #+1 °C for faster temp target arrival
        M106 S204 #part cooling fan 80%
        TEMPERATURE_WAIT SENSOR="heater_generic chamber" MINIMUM={target_chamber-0.1} #wait until chamber temp is very nearly reached
        SET_CHAMBER CHAMBER_TEMP={target_chamber} #set correct chamber target and let PID do its magic
    {% endif %}

    #in case chamber was already heated
    {% if target_chamber > 0 %}
        SET_CHAMBER CHAMBER_TEMP={target_chamber} 
    {% endif %}  # Waits for chamber temp

[gcode_macro HEAT_CHAMBER]
description: Maintain chamber temp using BED_FAN (heater_generic chamber) + bed heat source
variable_drive_bed: 110
variable_hold_bed: 95
gcode:
  {% set target = params.TARGET|default(50)|float %}
  {% set drive  = params.DRIVE_BED|default(printer["gcode_macro HEAT_CHAMBER"].drive_bed)|float %}
  {% set hold   = params.HOLD_BED|default(printer["gcode_macro HEAT_CHAMBER"].hold_bed)|float %}

  RESPOND PREFIX="chamber" MSG="Target={target}C. Bed drive={drive}C then hold={hold}C. Enabling chamber PID fan control."
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={drive}
  SET_HEATER_TEMPERATURE HEATER=chamber TARGET={target}

  TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={target}

  RESPOND PREFIX="chamber" MSG="Reached {target}C. Dropping bed to hold temp {hold}C."
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={hold}

[gcode_macro CHAMBER_OFF]
gcode:
  SET_HEATER_TEMPERATURE HEATER=chamber TARGET=0
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=0

