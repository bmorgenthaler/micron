[gcode_shell_command screen_off]
command: bash -c "export DISPLAY=:0; xrandr --output DSI-1 --off"
timeout: 5.
verbose: True

[gcode_shell_command screen_on]
command: bash -c "export DISPLAY=:0; xrandr --output DSI-1 --auto"
timeout: 5.
verbose: True

[gcode_macro SCREEN_OFF]
gcode:
    {% if printer.idle_timeout.state == "Idle" %}
        RUN_SHELL_COMMAND CMD=screen_off
    {% endif %}

[gcode_macro SCREEN_ON]
description: Turn KlipperScreen display on
gcode:
    RUN_SHELL_COMMAND CMD=screen_on
