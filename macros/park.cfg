[gcode_macro PARK]
gcode:
    {% set th = printer.toolhead %}
    # Mirrors PRINT_END's park target (back corner, X10/Y185, Z60) — assumes a
    # clear bed (e.g. blobifier catch is elsewhere on the plate, not under the
    # nozzle's current position). Lift first so the lateral move doesn't drag
    # through anything sitting between here and the corner.
    {% set lift_z = [th.position.z + 5.0, th.axis_maximum.z]|min %}
    G0 Z{lift_z} F3000
    {% set park_x = [[10, th.axis_minimum.x]|max, th.axis_maximum.x]|min %}
    {% set park_y = [[185, th.axis_minimum.y]|max, th.axis_maximum.y]|min %}
    {% set park_z = [[60, lift_z]|max, th.axis_maximum.z]|min %}
    G0 X{park_x} Y{park_y} Z{park_z} F3600

[gcode_macro G32]
gcode:
    BED_MESH_CLEAR
    G28
    QUAD_GANTRY_LEVEL
    G28
    G0 X87.5 Y90 Z30 F3600

[gcode_macro PARK_AND_DISABLE]
description: Park head then disable motors. Stock Klipper clears homed state on M18 - rehome before next move.
gcode:
    {% set th = printer.toolhead %}
    # Same back-corner park target as PARK — see that macro for the assumption note.
    {% set lift_z = [th.position.z + 5.0, th.axis_maximum.z]|min %}
    G0 Z{lift_z} F3000
    {% set park_x = [[10, th.axis_minimum.x]|max, th.axis_maximum.x]|min %}
    {% set park_y = [[185, th.axis_minimum.y]|max, th.axis_maximum.y]|min %}
    {% set park_z = [[60, lift_z]|max, th.axis_maximum.z]|min %}
    G0 X{park_x} Y{park_y} Z{park_z} F3600
    M400
    M18

[gcode_macro UNSAFE_FORCE_MOVE_DOWN]
description: Force coordinated Z drop without homing. USE WITH CAUTION — no endstop protection.
gcode:
    {% set dist = params.DIST|default(20)|float %}
    {% set speed = params.SPEED|default(5)|float %}
    SET_KINEMATIC_POSITION Z=150
    G90
    G0 Z{150 - dist} F{speed * 60}
    
[gcode_macro SERVICE]
description: Move toolhead to service position. Homes first if not already homed.
variable_x: 86
variable_y: 20
variable_z: 25
variable_speed: 10000
gcode:
    {% set th = printer.toolhead %}
    {% set vars = printer["gcode_macro SERVICE"] %}

    {% if 'xyz' not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    G90
    {% if th.position.z < vars.z %}
        G0 Z{vars.z} F{vars.speed}
    {% endif %}
    G0 X{vars.x} Y{vars.y} F{vars.speed}
    G0 Z{vars.z} F{vars.speed}

[gcode_macro BED_CLEAR]
description: Move toolhead to center position. Homes first if not already homed.
variable_x: 86
variable_y: 90
variable_z: 25
variable_speed: 10000
gcode:
    {% set th = printer.toolhead %}
    {% set vars = printer["gcode_macro BED_CLEAR"] %}

    {% if 'xyz' not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    G90
    {% if th.position.z < vars.z %}
        G0 Z{vars.z} F{vars.speed}
    {% endif %}
    G0 X{vars.x} Y{vars.y} F{vars.speed}
    G0 Z{vars.z} F{vars.speed}
