[gcode_macro PARK]
gcode:
    {% set th = printer.toolhead %}
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y//2} Z30

[gcode_macro G32]
gcode:
    BED_MESH_CLEAR
    G28
    QUAD_GANTRY_LEVEL
    G28
    G0 X87.5 Y90 Z30 F3600

[gcode_macro PARK_AND_DISABLE]
description: Park head then disable motors. Homing state preserved via Kalico - rehome Z before next print.
gcode:
    {% set th = printer.toolhead %}
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y//2} Z30 F10000
    M400
    M18
    SET_AXIS_IS_HOMED AXIS=X VALUE=1
    SET_AXIS_IS_HOMED AXIS=Y VALUE=1
    SET_AXIS_IS_HOMED AXIS=Z VALUE=1
