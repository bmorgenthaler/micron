##### Filament System — macros/filament.cfg #####
#
# Handles: load, unload, mid-print filament change, purge, sensor management
#
# Sensor topology:
#   filament_upper (thb:FS)     = PRE sensor  — far from hotend, detects spool runout early
#   filament_lower (thb:PROBE)  = POST sensor — near hotend, last line of defense
#
# Mid-print change flow:
#   upper runout → save print temp → PAUSE → disable both sensors → tip form + unload
#   → prompt insert → LOAD_FILAMENT → feed to lower → purge → confirm → reheat → RESUME
#
# Idle load flow:
#   insert → _INSERT_HANDLER → LOAD_FILAMENT → feed to lower → purge → confirm → done
#
# All unload paths use explicit M109 to avoid _LOW_TEMP_CHECK silent failure bug.

# ─────────────────────────────────────────────────────────────────
# VARIABLES
# ─────────────────────────────────────────────────────────────────

[gcode_macro FILAMENT_VARS]
variable_extruder_temp:            230    # fallback load/unload temp when no target is set
variable_ending_length:            -15    # retract after purge (mm, negative)
variable_continuous_chunk_length:    5    # mm per extrusion chunk, feed and purge phases
variable_continuous_feed_speed:    200    # mm/min — derived from slowest calibrated MVS (8mm³/s, Coex3D PETG/Revo Micro)
variable_feed_max_distance:         60    # safety cap (mm) — direct-drive WWGT, no bowden
variable_purge_max_distance:       600    # safety cap (mm) — runaway guard if STOP is missed
variable_feed_distance:              0    # session accumulator, reset each load
variable_purge_distance:             0    # session accumulator, reset each load
variable_stop_requested:         False    # set True by on-screen STOP button during purge
variable_mid_print_change:       False    # True when paused mid-print for filament change
variable_saved_extruder_temp:        0    # print temp saved before PAUSE; restored on RESUME

gcode:


# ─────────────────────────────────────────────────────────────────
# SENSOR HANDLERS
# ─────────────────────────────────────────────────────────────────

[gcode_macro _INSERT_HANDLER]
description: Called on filament_upper insert event.
gcode:
  {% set state = printer.print_stats.state %}
  {% if state == "printing" %}
    # Shouldn't happen during a live print — ignore silently
  {% elif state == "paused" %}
    # Filament detected while paused; let user trigger LOAD_FILAMENT manually or via prompt
    RESPOND PREFIX="🧵" MSG="Filament detected at upper sensor. Tap 'Load Filament' in the prompt or run LOAD_FILAMENT."
  {% else %}
    # Idle: auto-start load sequence
    RESPOND PREFIX="🧵" MSG="Filament inserted — starting load sequence."
    {% set fvars = printer["gcode_macro FILAMENT_VARS"] %}
    {% set target_temp = [printer.extruder.target|int, fvars.extruder_temp]|max %}
    M109 S{target_temp}
    NOZZLE_LIGHTS_ON
    LOAD_FILAMENT
  {% endif %}


[gcode_macro _RUNOUT_HANDLER]
description: Called on filament_upper runout. Manages clean pause and unload for mid-print change.
gcode:
  {% set state = printer.print_stats.state %}
  {% set lower_present = printer['filament_switch_sensor filament_lower'].filament_detected %}
  {% if state == "printing" %}
    {% if not lower_present %}
      RESPOND TYPE=error MSG="FILAMENT RUNOUT — both sensors clear. Emergency pause."
    {% else %}
      RESPOND TYPE=error MSG="FILAMENT RUNOUT — upper sensor empty. Pausing for filament change."
    {% endif %}
    # Save print temp before PAUSE (caller retains heater target until PAUSE executes)
    SET_GCODE_VARIABLE MACRO=FILAMENT_VARS VARIABLE=saved_extruder_temp VALUE={printer.extruder.target|int}
    SET_GCODE_VARIABLE MACRO=FILAMENT_VARS VARIABLE=mid_print_change VALUE=True
    PAUSE
    # PAUSE parks the head; M400 in _UNLOAD_FILAMENT_SEQUENCE waits for park moves
    _FS_DISABLE_ALL
    _UNLOAD_FILAMENT_SEQUENCE
  {% elif state == "paused" %}
    RESPOND PREFIX="⚠️" MSG="Upper sensor triggered while paused — filament change already in progress."
  {% else %}
    RESPOND PREFIX="⚠️" MSG="Filament removed from upper sensor."
  {% endif %}


[gcode_macro _LOWER_RUNOUT_HANDLER]
description: Safety net — fires on filament_lower runout if upper sensor was bypassed (e.g. mid-path break).
gcode:
  {% set state = printer.print_stats.state %}
  {% set already_handling = printer["gcode_macro FILAMENT_VARS"].mid_print_change %}
  {% if state == "printing" and not already_handling %}
    RESPOND TYPE=error MSG="EMERGENCY: lower filament sensor empty — upper was not triggered. Pausing immediately."
    SET_GCODE_VARIABLE MACRO=FILAMENT_VARS VARIABLE=saved_extruder_temp VALUE={printer.extruder.target|int}
    SET_GCODE_VARIABLE MACRO=FILAMENT_VARS VARIABLE=mid_print_change VALUE=True
    PAUSE
    _FS_DISABLE_ALL
    _UNLOAD_FILAMENT_SEQUENCE
  {% endif %}
  

# ─────────────────────────────────────────────────────────────────
# LOAD FILAMENT (public entry point)
# ─────────────────────────────────────────────────────────────────

[gcode_macro LOAD_FILAMENT]
description: Load filament. Continuous feed-to-sensor, then continuous purge until STOP pressed. Idle or mid-print. Optional TEMP override.
gcode:
  {% if printer.print_stats.state == "printing" %}
    RESPOND TYPE=error MSG="LOAD_FILAMENT: Cannot load while printing."
  {% else %}
    {% set fvars = printer["gcode_macro FILAMENT_VARS"] %}
    {% set param_temp = params.TEMP|default(0)|int %}

    {% if param_temp > 0 %}
      {% set target_temp = param_temp %}
    {% elif fvars.mid_print_change and fvars.saved_extruder_temp > 0 %}
      {% set target_temp = fvars.saved_extruder_temp %}
    {% elif printer.extruder.target > 0 %}
      {% set target_temp = printer.extruder.target|int %}
    {% else %}
      {% set target_temp = fvars.extruder_temp %}
    {% endif %}

    RESPOND PREFIX="🧵" MSG="LOAD_FILAMENT: Heating to {target_temp}C (mid_print={fvars.mid_print_change})"
    M109 S{target_temp}

    SET_GCODE_VARIABLE MACRO=FILAMENT_VARS VARIABLE=feed_distance VALUE=0
    SET_GCODE_VARIABLE MACRO=FILAMENT_VARS VARIABLE=purge_distance VALUE=0
    SET_GCODE_VARIABLE MACRO=FILAMENT_VARS VARIABLE=stop_requested VALUE=False
    SAVE_GCODE_STATE NAME=LOAD_FILAMENT_state
    M83

    RESPOND PREFIX="🧵" MSG="LOAD_FILAMENT: Feeding to lower sensor at {fvars.continuous_feed_speed}mm/min..."
    _FEED_CONTINUOUS
  {% endif %}


[gcode_macro _FEED_CONTINUOUS]
description: Recursive chunked feed toward filament_lower. Auto-stops on sensor trigger or safety cap.
gcode:
  {% set fvars = printer["gcode_macro FILAMENT_VARS"] %}
  {% set chunk = fvars.continuous_chunk_length %}
  {% set speed = fvars.continuous_feed_speed %}
  {% set fed = fvars.feed_distance %}

  {% if printer['filament_switch_sensor filament_lower'].filament_detected %}
    RESPOND PREFIX="✅" MSG="LOAD_FILAMENT: Lower sensor triggered after {fed}mm. Starting purge."
    _PURGE_CONTINUOUS_PROMPT
  {% elif fed >= fvars.feed_max_distance %}
    RESPOND TYPE=error MSG="LOAD_FILAMENT: Filament did not reach lower sensor after {fed}mm. Check path and try again."
    M400
    NOZZLE_LIGHTS_ON
    RESTORE_GCODE_STATE NAME=LOAD_FILAMENT_state
  {% else %}
    G1 E{chunk} F{speed}
    M400
    SET_GCODE_VARIABLE MACRO=FILAMENT_VARS VARIABLE=feed_distance VALUE={fed + chunk}
    _FEED_CONTINUOUS
  {% endif %}


[gcode_macro _PURGE_CONTINUOUS_PROMPT]
description: Shows the STOP prompt once, then enters the continuous purge loop.
gcode:
  RESPOND TYPE=command MSG="action:prompt_begin Filament Load — Purging"
  RESPOND TYPE=command MSG="action:prompt_text Extruding continuously at {printer['gcode_macro FILAMENT_VARS'].continuous_feed_speed}mm/min. Press STOP once color is clean and flow is consistent."
  RESPOND TYPE=command MSG="action:prompt_button STOP|_PURGE_STOP_REQUEST"
  RESPOND TYPE=command MSG="action:prompt_show"
  _PURGE_CONTINUOUS


[gcode_macro _PURGE_CONTINUOUS]
description: Recursive chunked purge extrusion. Stops on STOP button or safety cap.
gcode:
  {% set fvars = printer["gcode_macro FILAMENT_VARS"] %}
  {% set chunk = fvars.continuous_chunk_length %}
  {% set speed = fvars.continuous_feed_speed %}
  {% set purged = fvars.purge_distance %}

  {% if fvars.stop_requested %}
    _LOAD_FILAMENT_DONE
  {% elif purged >= fvars.purge_max_distance %}
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND TYPE=error MSG="LOAD_FILAMENT: Purge safety cap ({fvars.purge_max_distance}mm) reached without STOP. Run LOAD_FILAMENT again or investigate."
    M400
  {% else %}
    G1 E{chunk} F{speed}
    M400
    SET_GCODE_VARIABLE MACRO=FILAMENT_VARS VARIABLE=purge_distance VALUE={purged + chunk}
    _PURGE_CONTINUOUS
  {% endif %}


[gcode_macro _PURGE_STOP_REQUEST]
description: Bound to the on-screen STOP button.
gcode:
  RESPOND TYPE=command MSG="action:prompt_end"
  SET_GCODE_VARIABLE MACRO=FILAMENT_VARS VARIABLE=stop_requested VALUE=True
  RESPOND PREFIX="🧵" MSG="LOAD_FILAMENT: STOP received — finishing current chunk."


[gcode_macro _LOAD_FILAMENT_DONE]
description: Purge stopped by user. Finalizes load, resumes print if mid-print change.
gcode:
  {% set fvars = printer["gcode_macro FILAMENT_VARS"] %}

  G1 E{fvars.ending_length} F1800
  M400

  SET_GCODE_VARIABLE MACRO=FILAMENT_VARS VARIABLE=stop_requested VALUE=False
  RESTORE_GCODE_STATE NAME=LOAD_FILAMENT_state
  NOZZLE_LIGHTS_ON

  {% if fvars.mid_print_change %}
    RESPOND PREFIX="🧵" MSG="Filament loaded. Reheating to {fvars.saved_extruder_temp}C and resuming."
    M109 S{fvars.saved_extruder_temp}
    _FS_ENABLE_ALL
    SET_GCODE_VARIABLE MACRO=FILAMENT_VARS VARIABLE=mid_print_change VALUE=False
    SET_GCODE_VARIABLE MACRO=FILAMENT_VARS VARIABLE=saved_extruder_temp VALUE=0
    RESUME
  {% else %}
    _FS_ENABLE_ALL
    RESPOND PREFIX="✅" MSG="Filament loaded."
  {% endif %}


# ─────────────────────────────────────────────────────────────────
# UNLOAD FILAMENT (public entry point)
# ─────────────────────────────────────────────────────────────────

[gcode_macro UNLOAD_FILAMENT]
description: Manual unload. Safe to call from console at any time. Optional TEMP and DISTANCE params.
gcode:
  {% set fvars = printer["gcode_macro FILAMENT_VARS"] %}
  {% set param_temp = params.TEMP|default(0)|int %}
  {% set distance = params.DISTANCE|default(105)|float %}

  # Temp priority: explicit param > current target > fallback default
  {% if param_temp > 0 %}
    {% set target_temp = param_temp %}
  {% elif printer.extruder.target > 0 %}
    {% set target_temp = printer.extruder.target|int %}
  {% else %}
    {% set target_temp = fvars.extruder_temp %}
  {% endif %}

  RESPOND PREFIX="🧵" MSG="UNLOAD_FILAMENT: Heating to {target_temp}C"
  M109 S{target_temp}

  M400
  SAVE_GCODE_STATE NAME=UNLOAD_FILAMENT_state
  M82
  G92 E0

  RESPOND PREFIX="🧵" MSG="UNLOAD_FILAMENT: Tip forming"
  G1 E2 F1800
  G1 E0 F1800
  G1 E3 F1800
  G1 E0 F1800
  G1 E4 F1800
  G1 E0 F1800

  M83
  RESPOND PREFIX="🧵" MSG="UNLOAD_FILAMENT: Initial retract"
  G1 E-15 F900
  G4 P2000
  RESPOND PREFIX="🧵" MSG="UNLOAD_FILAMENT: Long pull -{distance}mm"
  G1 E-{distance} F600
  M400

  RESTORE_GCODE_STATE NAME=UNLOAD_FILAMENT_state
  NOZZLE_LIGHTS_ON
  RESPOND PREFIX="✅" MSG="UNLOAD_FILAMENT: Done"


[gcode_macro _UNLOAD_FILAMENT_SEQUENCE]
description: Internal unload for runout flow. Called after PAUSE and _FS_DISABLE_ALL. No heat guard needed.
gcode:
  {% set fvars = printer["gcode_macro FILAMENT_VARS"] %}
  # Use saved print temp — target may already be cooling after PAUSE
  {% set target_temp = fvars.saved_extruder_temp if fvars.saved_extruder_temp > 0 else fvars.extruder_temp %}

  RESPOND PREFIX="🧵" MSG="_UNLOAD_FILAMENT_SEQUENCE: Heating to {target_temp}C"
  M109 S{target_temp}
  _NOZZLE_LIGHTS_BRIGHT
  M400
  SAVE_GCODE_STATE NAME=UNLOAD_SEQ_state
  M82
  G92 E0

  G1 E2 F1800
  G1 E0 F1800
  G1 E3 F1800
  G1 E0 F1800
  G1 E4 F1800
  G1 E0 F1800

  M83
  G1 E-15 F900
  G4 P2000
  G1 E-105 F600
  M400

  RESTORE_GCODE_STATE NAME=UNLOAD_SEQ_state
  RESPOND PREFIX="✅" MSG="_UNLOAD_FILAMENT_SEQUENCE: Filament unloaded."

  # Re-enable upper sensor only: detect new filament insert; lower stays off until after load
  _FS_ENABLE_UPPER
  _FILAMENT_INSERT_PROMPT


[gcode_macro _FILAMENT_INSERT_PROMPT]
description: Shown after unload during mid-print change. User inserts filament and confirms.
gcode:
  RESPOND TYPE=command MSG="action:prompt_begin Filament Change"
  RESPOND TYPE=command MSG="action:prompt_text Filament unloaded. Insert new filament, then tap Load."
  RESPOND TYPE=command MSG="action:prompt_button_group_start"
  RESPOND TYPE=command MSG="action:prompt_button Load Filament|LOAD_FILAMENT"
  RESPOND TYPE=command MSG="action:prompt_button Cancel (stay paused)|_FILAMENT_CHANGE_CANCEL"
  RESPOND TYPE=command MSG="action:prompt_button_group_end"
  RESPOND TYPE=command MSG="action:prompt_show"


[gcode_macro _FILAMENT_CHANGE_CANCEL]
description: User cancelled mid-print filament change. Print stays paused; sensors remain off.
gcode:
  RESPOND TYPE=command MSG="action:prompt_end"
  RESPOND PREFIX="⚠️" MSG="Filament change cancelled. Print paused. Fix filament, then run LOAD_FILAMENT."


# ─────────────────────────────────────────────────────────────────
# SENSOR ENABLE / DISABLE
# ─────────────────────────────────────────────────────────────────

[gcode_macro _FS_ENABLE_ALL]
description: Enable both filament sensors
gcode:
  SET_FILAMENT_SENSOR SENSOR=filament_upper ENABLE=1
  SET_FILAMENT_SENSOR SENSOR=filament_lower ENABLE=1

[gcode_macro _FS_DISABLE_ALL]
description: Disable both filament sensors (during filament change to prevent spurious triggers)
gcode:
  SET_FILAMENT_SENSOR SENSOR=filament_upper ENABLE=0
  SET_FILAMENT_SENSOR SENSOR=filament_lower ENABLE=0

[gcode_macro _FS_ENABLE_UPPER]
description: Enable upper sensor only (detect filament insert after unload)
gcode:
  SET_FILAMENT_SENSOR SENSOR=filament_upper ENABLE=1

# Legacy aliases — kept for any existing callers
[gcode_macro _FS_ENABLE]
description: Enable lower filament sensor
gcode:
  SET_FILAMENT_SENSOR SENSOR=filament_lower ENABLE=1

[gcode_macro _FS_DISABLE]
description: Disable lower filament sensor
gcode:
  SET_FILAMENT_SENSOR SENSOR=filament_lower ENABLE=0


# ─────────────────────────────────────────────────────────────────
# TEMPERATURE HELPER
# ─────────────────────────────────────────────────────────────────

[gcode_macro _LOW_TEMP_CHECK]
description: |
  Heat nozzle if below target. Optional T param overrides.
  WARNING: Silent failure bug — if extruder.target == 0 and T is unset,
  it inherits the default without heating. Prefer explicit M109 in callers.
gcode:
  {% set T = params.T|default(printer["gcode_macro FILAMENT_VARS"].extruder_temp)|float %}
  {% if printer.extruder.target > 0 %}
    {% if printer.extruder.temperature < printer.extruder.target %}
      M109 S{printer.extruder.target|float}
    {% endif %}
  {% else %}
    M109 S{T}
  {% endif %}


# ─────────────────────────────────────────────────────────────────
# SET_TEMP helper (retained for backward compat)
# ─────────────────────────────────────────────────────────────────

[gcode_macro SET_TEMP]
gcode:
  {% set HEATER = params.HEATER|default("")|string %}
  {% set TEMP = params.TEMP|default(0)|int %}
  {% set WAIT = params.WAIT|default(0)|int %}
  {% if HEATER == "extruder" %}
    {% if WAIT == 1 %}
      M109 S{TEMP}
    {% else %}
      M104 S{TEMP}
    {% endif %}
  {% else %}
    {% if WAIT == 1 %}
      M190 S{TEMP}
    {% else %}
      M140 S{TEMP}
    {% endif %}
  {% endif %}

