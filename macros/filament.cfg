#	#UNLOAD_FILAMENT          # uses default length
#	#UNLOAD_FILAMENT LENGTH=50

[gcode_macro LOAD_FILAMENT]
description: Prompt for filament type, heat, and load through sensors
gcode:
    SCREEN_ON
    RESPOND TYPE=command MSG="action:prompt_begin Load Filament"
    RESPOND TYPE=command MSG="action:prompt_text Select filament type to load:"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button PLA|_LOAD_FILAMENT_START FILAMENT=PLA"
    RESPOND TYPE=command MSG="action:prompt_button PET/PETG|_LOAD_FILAMENT_START FILAMENT=PETG"
    RESPOND TYPE=command MSG="action:prompt_button ASA|_LOAD_FILAMENT_START FILAMENT=ASA"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button PA/Nylon|_LOAD_FILAMENT_START FILAMENT=PA"
    RESPOND TYPE=command MSG="action:prompt_button PC|_LOAD_FILAMENT_START FILAMENT=PC"
    RESPOND TYPE=command MSG="action:prompt_button TPU|_LOAD_FILAMENT_START FILAMENT=TPU"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_show"


[gcode_macro _LOAD_FILAMENT_START]
description: Internal - executes load after filament type selected
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    {% set f = params.FILAMENT|default("PLA")|string|upper %}

    # --- Temp map ---
    {% if f == "PLA" %}
        {% set temp = 220 %}
    {% elif f == "PETG" %}
        {% set temp = 240 %}
    {% elif f == "ASA" %}
        {% set temp = 260 %}
    {% elif f in ["PA", "NYLON"] %}
        {% set temp = 260 %}
    {% elif f == "PC" %}
        {% set temp = 280 %}
    {% elif f == "TPU" %}
        {% set temp = 230 %}
    {% else %}
        {% set temp = 200 %}
    {% endif %}

    SET_DISPLAY_TEXT MSG="Heating for {f} to {temp}c"
    RESPOND PREFIX=load MSG="Filament: {f} - heating to {temp}c"
    M109 S{temp}

    SET_DISPLAY_TEXT MSG="Loading {f}..."
    M83
    G92 E0

    # Feed to lower sensor
    G1 E35 F200

    {% if not printer['filament_switch_sensor filament_lower'].filament_detected %}
        RESPOND TYPE=error MSG="Lower sensor not triggered after 35mm - check filament path."
        M117 Check filament path!
    {% else %}
        RESPOND PREFIX=load MSG="Lower sensor triggered. Feeding through hotend..."
    {% endif %}

    # Through cold zone and melt zone
    G1 E20 F200
    G1 E20 F120
    G1 E10 F80

    G92 E0
    SET_DISPLAY_TEXT MSG="{f} load complete"
    RESPOND PREFIX=load MSG="{f} loaded at {temp}c. Check purge bead."

[gcode_macro UNLOAD_FILAMENT]
description: Heat hotend if needed, ram, then retract filament past both sensors
gcode:
    SCREEN_ON

    {% set min_temp = 180 %}
    {% set target_temp = params.TEMP|default(0)|float %}
    {% set current_temp = printer.extruder.temperature|float %}

    # --- Determine heating ---
    {% if target_temp > 0 %}
        {% if current_temp < target_temp - 5 %}
            SET_DISPLAY_TEXT MSG="Heating hotend to {target_temp}c for unload"
            M109 S{target_temp}
        {% endif %}
    {% elif current_temp < min_temp %}
        SET_DISPLAY_TEXT MSG="Heating hotend to 200c for unload"
        RESPOND PREFIX=unload MSG="Hotend cold - heating to 200c. Pass TEMP=xxx to override."
        M109 S200
    {% endif %}

    SET_DISPLAY_TEXT MSG="Unloading filament..."
    M83
    G92 E0

    # Ram to pack the melt zone and form a clean tip (Revo HF tip forming)
    G1 E8 F300

    # Fast retract to clear the melt zone / Revo heat break
    # Revo HF has a short cold zone so 15mm is enough to clear the melt zone
    G1 E-15 F3600

    # Pull back through the cold zone and past the lower sensor
    G1 E-30 F900

    # Check lower sensor - should be clear now
    {% if printer['filament_switch_sensor filament_lower'].filament_detected %}
        RESPOND TYPE=error MSG="Lower sensor still triggered after 45mm retract - possible jam or insufficient retract."
        M117 Check lower sensor!
    {% else %}
        RESPOND PREFIX=unload MSG="Clear of lower sensor. Retracting past upper sensor..."
    {% endif %}

    # Retract past upper sensor and out of the extruder gears
    G1 E-40 F600

    # Check upper sensor - should be clear
    {% if printer['filament_switch_sensor filament_upper'].filament_detected %}
        RESPOND TYPE=error MSG="Upper sensor still triggered - filament may still be in gears. Manual intervention needed."
        M117 Check upper sensor!
    {% else %}
        RESPOND PREFIX=unload MSG="Filament clear of all sensors. Safe to pull free."
    {% endif %}

    G92 E0
    SET_DISPLAY_TEXT MSG="Unload complete"