[gcode_macro _CHAMBER_BY_FILAMENT]
description: Internal helper. Sets chamber target based on FILAMENT_TYPE and optionally bed drive/hold.
variable_last_filament: "UNKNOWN"
gcode:
  {% set f = (params.FILAMENT_TYPE|default("UNKNOWN")|string|upper) %}
  SET_GCODE_VARIABLE MACRO=_CHAMBER_BY_FILAMENT VARIABLE=last_filament VALUE='"{f}"'

  # Defaults
  {% set chamber_target = 0 %}
  {% set drive_bed = 0 %}
  {% set hold_bed = 0 %}

  # ---- Map filament -> targets ----
  # Tune these to your machine + insulation + ambient.
  {% if f in ["ABS","ASA"] %}
    {% set chamber_target = 50 %}
    {% set drive_bed = 110 %}
    {% set hold_bed = 95 %}
  {% elif f in ["PC","POLYCARBONATE"] %}
    {% set chamber_target = 60 %}
    {% set drive_bed = 120 %}
    {% set hold_bed = 105 %}
  {% elif f in ["NYLON","PA","PA6","PA12"] %}
    {% set chamber_target = 45 %}
    {% set drive_bed = 100 %}
    {% set hold_bed = 90 %}
  {% elif f in ["PETG"] %}
    {% set chamber_target = 0 %}
  {% elif f in ["PLA","TPU","TPE"] %}
    {% set chamber_target = 0 %}
  {% else %}
    # Unknown filament: fail safe = don't heat chamber
    {% set chamber_target = 0 %}
  {% endif %}

  # ---- Apply ----
  {% if chamber_target > 0 %}
    RESPOND PREFIX="chamber" MSG="Filament={f}. Target={chamber_target}C (Bed drive={drive_bed}C hold={hold_bed}C)."

    # Bed provides heat; chamber "heater" controls airflow
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={drive_bed}
    SET_HEATER_TEMPERATURE HEATER=chamber TARGET={chamber_target}

    # Wait until chamber reaches target, then drop bed to hold
    TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={chamber_target}
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={hold_bed}
  {% else %}
    RESPOND PREFIX="chamber" MSG="Filament={f}. Chamber heat disabled."
    SET_HEATER_TEMPERATURE HEATER=chamber TARGET=0
  {% endif %}
