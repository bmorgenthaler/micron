##########################################
# PRINT_START macro for Micron R1
#
# PrusaSlicer start gcode:
# M104 S0
# M140 S0
# PRINT_START EXTRUDER=[first_layer_temperature[initial_extruder]] BED=[first_layer_bed_temperature] CHAMBER=[chamber_temperature] MATERIAL={filament_type[initial_extruder]}
#
# OrcaSlicer start gcode:
# M104 S0
# M140 S0
# PRINT_START EXTRUDER=[first_layer_temperature] BED=[first_layer_bed_temperature] CHAMBER=[chamber_temperature] MATERIAL={filament_type[initial_extruder]}
##########################################
# macros/print_start.cfg
[gcode_macro _PRINT_START_PENDING]
variable_extruder: 0
variable_bed: 0
variable_chamber: 0
variable_material: "PLA"
variable_skip_mismatch: False
gcode:


[gcode_macro PRINT_START]
gcode:
  {% set target_bed = params.BED|int %}
  {% set target_extruder = params.EXTRUDER|int %}
  {% set target_chamber = params.CHAMBER|default("0")|int %}
  {% set target_chamber_minimal = params.CHAMBER_MINIMAL|default("0")|int %}
  {% set target_chamber_wait = [target_chamber, target_chamber_minimal]|select(">", 0)|min|default(0) %}
  {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}
  {% set clean_temp = [target_extruder * 0.85, 150]|max|int %}
  {% set material = params.MATERIAL|default("PLA")|string|upper %}
  {% set lower = printer['filament_switch_sensor filament_lower'].filament_detected %}
  {% set upper = printer['filament_switch_sensor filament_upper'].filament_detected %}

  # macros/print_start.cfg — inside PRINT_START, before filament sensor {% if %}
  {% set svv = printer.save_variables.variables %}
  {% set loaded_filament = svv.loaded_filament|default("UNKNOWN")|string|upper %}
  {% set skip_mismatch = printer["gcode_macro _PRINT_START_PENDING"].skip_mismatch %}
  
  {% if loaded_filament != "UNKNOWN" and loaded_filament != material and not skip_mismatch %}
    SET_GCODE_VARIABLE MACRO=_PRINT_START_PENDING VARIABLE=extruder VALUE={target_extruder}
    SET_GCODE_VARIABLE MACRO=_PRINT_START_PENDING VARIABLE=bed VALUE={target_bed}
    SET_GCODE_VARIABLE MACRO=_PRINT_START_PENDING VARIABLE=chamber VALUE={target_chamber}
    SET_GCODE_VARIABLE MACRO=_PRINT_START_PENDING VARIABLE=material VALUE='"{material}"'
    { action_call_remote_method("notify",
        name="gcode_pushover",
        title="⚠️ Filament Mismatch",
        message="Slicer: " ~ material ~ " | Loaded: " ~ loaded_filament) }
    RESPOND TYPE=error MSG="PRINT_START: Filament mismatch — slicer={material}, loaded={loaded_filament}"
    RESPOND TYPE=command MSG="action:prompt_begin Filament Mismatch"
    RESPOND TYPE=command MSG="action:prompt_text Slicer expects {material} but {loaded_filament} is loaded."
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button Continue Anyway|_PRINT_START_CONTINUE"
    RESPOND TYPE=command MSG="action:prompt_button Cancel|CANCEL_PRINT"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_show"
  {% else %}
    SET_GCODE_VARIABLE MACRO=_PRINT_START_PENDING VARIABLE=skip_mismatch VALUE=False
    # ... existing filament sensor guard and rest of PRINT_START body unchanged ...
  {% endif %}

  # ─── Filament guard — must be inline Jinja so the else-branch is never queued ───
  {% if not lower %}
    {% if not upper %}
      RESPOND TYPE=error MSG="PRINT_START: No filament at either sensor — aborting."
      { action_call_remote_method("notify",
          name="gcode_pushover",
          title="🚫 No Filament",
          message="Print aborted — no filament detected at either sensor.") }
    {% else %}
      RESPOND TYPE=error MSG="PRINT_START: Filament at upper sensor but not fed to hotend — aborting."
      { action_call_remote_method("notify",
          name="gcode_pushover",
          title="🚫 Filament Not Loaded",
          message="Print aborted — filament present but not fed to hotend. Run LOAD_FILAMENT.") }
    {% endif %}
    CANCEL_PRINT

  {% else %}

    SET_GCODE_OFFSET Z=0
    SKEW_PROFILE LOAD=Califlower
    CLEAR_PAUSE
    SET_LED LED=Chamber WHITE=0.5

    _STATUS_HOMING
    G28
    G90
    BED_MESH_CLEAR

    # Heatsoak for high-temp beds (ASA, PC, PA etc), or short soak for lower temps
    {% if target_bed > 90 %}
      SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"
      _STATUS_HEATING
      M106 S255
      TOGGLE_FILTER
      #This is not necessary because we end in the same position after homing
      #G1 X{x_wait} Y{y_wait} Z15 F9000
      G0 Z15 F9000
      M140 S{target_bed}
      M104 S120                                           # Pre-warm nozzle during soak, no ooze risk
      HEATSOAK_CHAMBER CHAMBER_TEMP={target_chamber}

    {% else %}
      SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"
      _STATUS_HEATING
      #This is not necessary because we end in the same position after homing
      #G1 X{x_wait} Y{y_wait} Z15 F9000
      G0 Z15 F9000
      M190 S{target_bed}
      M104 S120                                           # Pre-warm nozzle during soak, no ooze risk
      SET_DISPLAY_TEXT MSG="Soak for 5 min"
      G4 P300000
    {% endif %}

    # Heat to cleaning temp (85% of print temp, min 150)
    SET_DISPLAY_TEXT MSG="Hotend: {clean_temp}c for cleaning"
    _STATUS_HEATING
    M109 S{clean_temp}

    _STATUS_CLEANING
    CLEAN_NOZZLE

    # Move away from brush/bucket before fan-assisted cooldown
    G1 X{x_wait} Y{y_wait} Z15 F9000

    # Cool to ≤155 for Beacon contact calibration
    SET_DISPLAY_TEXT MSG="Cooling for contact calibration"
    M104 S150
    M106 S255                                             # PCF assists cooldown
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=155
    M106 S0

    G28 Z METHOD=CONTACT CALIBRATE=1                      # Calibrate z offset and beacon model

    SET_DISPLAY_TEXT MSG="Leveling"
    _STATUS_LEVELING
    QUAD_GANTRY_LEVEL

    SET_DISPLAY_TEXT MSG="Bed mesh"
    _STATUS_MESHING
    BED_MESH_CALIBRATE

    G28 Z METHOD=CONTACT CALIBRATE=0                      # Final z offset with hot nozzle

    # Heat to print temp
    SET_DISPLAY_TEXT MSG="Hotend: {target_extruder}c"
    _STATUS_HEATING
    #G1 X{x_wait} Y{y_wait} Z15 F9000
    G0 Z15 F9000
    M107
    M109 S{target_extruder}

    # Apply Beacon nozzle thermal expansion compensation
    # Requires BEACON_CALIBRATE_NOZZLE_TEMP_OFFSET to have been run once
    _BEACON_SET_NOZZLE_TEMP_OFFSET

    SET_DISPLAY_TEXT MSG="Printer goes brr"
    _STATUS_PRINTING
    G0 X{x_wait - 50} Y4 F10000
    G0 Z0.4
    G91
    G1 X100 E20 F1000
    G90

  {% endif %}

[gcode_macro _PRINT_START_CONTINUE]
description: Resume PRINT_START after user acknowledges filament mismatch
gcode:
  RESPOND TYPE=command MSG="action:prompt_end"
  {% set p = printer["gcode_macro _PRINT_START_PENDING"] %}
  SET_GCODE_VARIABLE MACRO=_PRINT_START_PENDING VARIABLE=skip_mismatch VALUE=True
  PRINT_START EXTRUDER={p.extruder} BED={p.bed} CHAMBER={p.chamber} MATERIAL={p.material}
