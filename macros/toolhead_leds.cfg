###############################################
# AntHead Nitehawk 36 RGB Status Macros
# Three NeoPixel GRB on [neopixel Toolhead]
# LED 1:   Status indicator
# LED 2+3: Nozzle lights (state tracked via _NOZZLE_LIGHTS variable)
###############################################

[gcode_macro _NOZZLE_LIGHTS]
description: State tracker for nozzle LEDs 2+3. Do not call directly.
variable_enabled: True
gcode:

[gcode_macro NOZZLE_LIGHTS_ON]
description: Turn on nozzle LEDs 2+3 and record state
gcode:
    SET_GCODE_VARIABLE MACRO=_NOZZLE_LIGHTS VARIABLE=enabled VALUE=True
    SET_LED LED=Toolhead RED=1 GREEN=1 BLUE=1 INDEX=2 SYNC=0 TRANSMIT=0
    SET_LED LED=Toolhead RED=1 GREEN=1 BLUE=1 INDEX=3 SYNC=0 TRANSMIT=1

[gcode_macro NOZZLE_LIGHTS_OFF]
description: Turn off nozzle LEDs 2+3 and record state
gcode:
    SET_GCODE_VARIABLE MACRO=_NOZZLE_LIGHTS VARIABLE=enabled VALUE=False
    SET_LED LED=Toolhead RED=0 GREEN=0 BLUE=0 INDEX=2 SYNC=0 TRANSMIT=0
    SET_LED LED=Toolhead RED=0 GREEN=0 BLUE=0 INDEX=3 SYNC=0 TRANSMIT=1

[gcode_macro _SET_TH_LED]
description: Set LED 1 to given color, honor nozzle LED state for 2+3
gcode:
    {% set r = params.R|default(0)|float %}
    {% set g = params.G|default(0)|float %}
    {% set b = params.B|default(0)|float %}
    {% set nozzle_on = printer["gcode_macro _NOZZLE_LIGHTS"].enabled %}
    SET_LED LED=Toolhead RED={r} GREEN={g} BLUE={b} INDEX=1 SYNC=0 TRANSMIT=0
    {% if nozzle_on %}
        SET_LED LED=Toolhead RED=1 GREEN=1 BLUE=1 INDEX=2 SYNC=0 TRANSMIT=0
        SET_LED LED=Toolhead RED=1 GREEN=1 BLUE=1 INDEX=3 SYNC=0 TRANSMIT=1
    {% else %}
        SET_LED LED=Toolhead RED=0 GREEN=0 BLUE=0 INDEX=2 SYNC=0 TRANSMIT=0
        SET_LED LED=Toolhead RED=0 GREEN=0 BLUE=0 INDEX=3 SYNC=0 TRANSMIT=1
    {% endif %}

[gcode_macro STATUS_OFF]
description: Turn off all toolhead LEDs
gcode:
    SET_LED LED=Toolhead RED=0 GREEN=0 BLUE=0 INDEX=1 SYNC=0 TRANSMIT=0
    SET_LED LED=Toolhead RED=0 GREEN=0 BLUE=0 INDEX=2 SYNC=0 TRANSMIT=0
    SET_LED LED=Toolhead RED=0 GREEN=0 BLUE=0 INDEX=3 SYNC=0 TRANSMIT=1

[gcode_macro STATUS_READY]
description: Idle/ready - green
gcode:
    _SET_TH_LED R=0 G=0.5 B=0

[gcode_macro STATUS_BUSY]
description: Busy/processing - orange
gcode:
    _SET_TH_LED R=0.8 G=0.3 B=0

[gcode_macro STATUS_HEATING]
description: Heating hotend - red
gcode:
    _SET_TH_LED R=1.0 G=0 B=0

[gcode_macro STATUS_HOMING]
description: Homing axes - blue
gcode:
    _SET_TH_LED R=0 G=0 B=1.0

[gcode_macro STATUS_LEVELING]
description: QGL in progress - yellow
gcode:
    _SET_TH_LED R=0.8 G=0.8 B=0

[gcode_macro STATUS_MESHING]
description: Bed mesh in progress - cyan
gcode:
    _SET_TH_LED R=0 G=0.8 B=0.8

[gcode_macro STATUS_CLEANING]
description: Nozzle clean/purge - purple
gcode:
    _SET_TH_LED R=0.5 G=0 B=0.5

[gcode_macro STATUS_PRINTING]
description: Printing - white at reduced brightness
gcode:
    _SET_TH_LED R=0.4 G=0.4 B=0.4

[gcode_macro STATUS_PART_READY]
description: Print complete - solid green
gcode:
    _SET_TH_LED R=0 G=1.0 B=0