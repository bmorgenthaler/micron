[gcode_macro PRINT_END]
gcode:
    {% set th = printer.toolhead %}
    # Capture chamber state before TURN_OFF_HEATERS clears it
    # (Jinja evaluates at expansion time, so this reads current state)
    {% set chamber_was_heated = printer["heater_generic chamber"].target > 0 %}

    M400                           ; wait for buffer to clear
    SET_GCODE_OFFSET Z=0           ; clear dynamic Z offset from contact probe
    SKEW_PROFILE LOAD=Califlower   ; Clear skew profile
    G90                            ; absolute positioning
    G92 E0                         ; zero the extruder
    G1 E-10.0 F3600                ; retract filament

    # Z lift first — clear print before any lateral move
    {% set str_z = [th.position.z + 5.0, th.axis_maximum.z]|min %}
    G0 Z{str_z} F3000

    # Stringing break — bidirectional X/Y with axis clamps
    {% set str_x = th.position.x + (20.0 if th.axis_maximum.x - th.position.x > 20 else -20.0) %}
    {% set str_x = [[str_x, th.axis_minimum.x]|max, th.axis_maximum.x]|min %}
    {% set str_y = th.position.y + (20.0 if th.axis_maximum.y - th.position.y > 20 else -20.0) %}
    {% set str_y = [[str_y, th.axis_minimum.y]|max, th.axis_maximum.y]|min %}
    G0 X{str_x} Y{str_y} F20000

    TURN_OFF_HEATERS
    M107                           ; turn off fan

    SET_DISPLAY_TEXT MSG="Parking"
    {% set park_z = [th.position.z + 10, 120]|max %}
    {% set park_z = [park_z, th.axis_maximum.z - 30]|min %}
    {% set park_x = [th.position.x, 10]|min %}
    {% set park_y = [th.position.y, th.axis_maximum.y - 30]|max %}
    G0 X{park_x} Y{park_y} Z{park_z} F3600
    SET_DISPLAY_TEXT MSG="Parked at Y{park_y} Z{park_z}"

    BED_MESH_CLEAR

    # Post-print air circulation — only when chamber was actively heated
    SET_DISPLAY_TEXT MSG="Cycling chamber air"
    {% if chamber_was_heated %}
      SET_HEATER_TEMPERATURE HEATER=chamber TARGET=75
      UPDATE_DELAYED_GCODE ID=filter_off DURATION=300
      UPDATE_DELAYED_GCODE ID=chamber_fan_off DURATION=300
    {% endif %}

    STATUS_PART_READY
    SET_DISPLAY_TEXT MSG="Printing done"