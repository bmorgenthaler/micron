[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:
    {% set th = printer.toolhead %}
    # Capture chamber state before TURN_OFF_HEATERS clears it
    # (Jinja evaluates at expansion time, so this reads current state)
    {% set chamber_was_heated = printer["heater_generic chamber"].target > 0 %}

    M400                           ; wait for buffer to clear
    SET_GCODE_OFFSET Z=0           ; clear dynamic Z offset from contact probe
    G92 E0                         ; zero the extruder
    G1 E-10.0 F3600                ; retract filament

    # Move nozzle to break stringing — within axis limits
    {% set str_x = [th.position.x + 20.0, th.axis_maximum.x]|min %}
    {% set str_y = [th.position.y + 20.0, th.axis_maximum.y]|min %}
    {% set str_z = [th.position.z + 1.0, th.axis_maximum.z]|min %}
    G90
    G0 X{str_x} Y{str_y} Z{str_z} F20000
    
    TURN_OFF_HEATERS
    M107                           ; turn off fan
    
    # Post-heater Z lift — within axis limits
    {% set lift_z = [str_z + 2.0, th.axis_maximum.z]|min %}
    G0 Z{lift_z} F3000
    
    # Post Print Parking
    {% set park_z = [th.position.z + 10, 130]|max %}
    {% set park_z = [park_z, th.axis_maximum.z - 10]|min %}
    G0 X10 Y{th.axis_maximum.y} Z{park_z} F3600

    BED_MESH_CLEAR

    # Post-print air circulation — only when chamber was actively heated (door closed)
    # Runs carbon filter + chamber fan at full blast for 300s to scrub fumes before opening
    {% if chamber_was_heated %}
      SET_HEATER_TEMPERATURE HEATER=chamber TARGET=75
      UPDATE_DELAYED_GCODE ID=filter_off DURATION=300
      UPDATE_DELAYED_GCODE ID=chamber_fan_off DURATION=300
    {% endif %}

    STATUS_PART_READY
