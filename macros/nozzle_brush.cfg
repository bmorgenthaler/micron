[gcode_macro CLEAN_NOZZLE]
description: Macro to clean nozzle on Micron R1, using Bambu Nozzle brush & Purge bucket.
variable_start_x: 52		# co-ordinate of left edge of nozzle brush
variable_start_y: 189.0		# co-ordinate of y-axis centre of nozzle brush
variable_start_z: 0.0		# co-ordinate of z height to use nozzle brush
variable_wipe_width: 33		# width of nozzle brush in mm
variable_wipe_qty: 10		# number of times to wipe nozzle
variable_wipe_spd: 200		# speed to wipe nozzle
variable_raise_distance: 10	# amount to raise toolhead after wipe
variable_min_wipe_temp: 150	# minimum temp considered safe to wipe

gcode:
  {% set current_temp = printer.extruder.temperature|float %}
  {% set min_temp = printer["gcode_macro CLEAN_NOZZLE"].min_wipe_temp|float %}

  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
  {% endif %}

  {% if current_temp >= min_temp %}
    # Already hot enough, clean immediately
    RESPOND PREFIX=🧹 MSG="Nozzle at {current_temp}C, proceeding with clean..."
    _CLEAN_NOZZLE_RUN
  {% else %}
    # Cold nozzle - prompt for material/temp
    RESPOND PREFIX=🌡️ MSG="Nozzle too cold ({current_temp}C). Select material to preheat..."
    RESPOND TYPE=command MSG="action:prompt_begin Nozzle Cold - Select Material"
    RESPOND TYPE=command MSG="action:prompt_text Nozzle is {current_temp}C (min {min_temp}C). Select material to preheat:"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button PLA (150C)|_CLEAN_NOZZLE_PREHEAT TEMP=150|primary"
    RESPOND TYPE=command MSG="action:prompt_button PETG (160C)|_CLEAN_NOZZLE_PREHEAT TEMP=160|primary"
    RESPOND TYPE=command MSG="action:prompt_button ABS/ASA (170C)|_CLEAN_NOZZLE_PREHEAT TEMP=170|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_button Cancel|RESPOND MSG=Cancelled|warning"
    RESPOND TYPE=command MSG="action:prompt_show"
  {% endif %}


[gcode_macro _CLEAN_NOZZLE_PREHEAT]
description: Preheat nozzle to target temp then run clean
gcode:
  {% set target = params.TEMP|default(150)|float %}
  RESPOND TYPE=command MSG="action:prompt_end"
  RESPOND PREFIX=🌡️ MSG="Heating nozzle to {target}C..."
  SET_DISPLAY_TEXT MSG="Heating to {target}C for nozzle clean"
  M109 S{target}                                                     # heat and wait
  _CLEAN_NOZZLE_RUN


[gcode_macro _CLEAN_NOZZLE_RUN]
description: Internal - executes the nozzle wipe routine
gcode:
  {% set cx = printer["gcode_macro CLEAN_NOZZLE"].start_x|float %}
  {% set cy = printer["gcode_macro CLEAN_NOZZLE"].start_y|float %}
  {% set cz = printer["gcode_macro CLEAN_NOZZLE"].start_z|float %}
  {% set wipe_width = printer["gcode_macro CLEAN_NOZZLE"].wipe_width|float %}
  {% set wipe_qty = printer["gcode_macro CLEAN_NOZZLE"].wipe_qty|int %}
  {% set wipe_spd = printer["gcode_macro CLEAN_NOZZLE"].wipe_spd|float %}
  {% set raise_distance = printer["gcode_macro CLEAN_NOZZLE"].raise_distance|float %}

  RESPOND PREFIX=🧹 MSG="Cleaning Nozzle..."
  SET_DISPLAY_TEXT MSG="Cleaning nozzle..."

  ### Move nozzle to start position ###
  G90
  G1 X{cx} Y{cy} F6000
  G1 Z{cz} F1000

  ### Wipe nozzle with staggered Y-axis ###
  {% for wipes in range(1, (wipe_qty + 1)) %}
    {% set y_offset = 0.5 if wipes % 2 == 0 else -0.5 %}
    G1 X{cx + wipe_width} Y{cy + y_offset} F{wipe_spd * 60}
    G1 X{cx} Y{cy} F{wipe_spd * 60}
  {% endfor %}

  ### Raise nozzle ###
  G91
  G1 Z{raise_distance} F1000
  G90

  SET_DISPLAY_TEXT MSG="Nozzle cleaning complete"
  RESPOND PREFIX=✅ MSG="Nozzle cleaning complete"
