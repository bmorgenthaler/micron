[gcode_macro NOTIFY]
gcode:
    {% set title = params.TITLE|default("🖨️ Micron")|string %}
    {% set msg = params.MSG|default("Notification")|string %}
    {action_call_remote_method("notify",
                               name="gcode_pushover",
                               title=title,
                               message=msg)}

[delayed_gcode _notify_print_complete]
gcode:
    {action_call_remote_method("notify",
                               name="pushover_complete",
                               title="Print Complete",
                               message="Finished: " ~ printer.print_stats.filename)}
