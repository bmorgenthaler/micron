[gcode_macro CALIBRATE_PLATE_CHECK]
description: Run with NO plate installed. Stores the bare-bed Beacon reading.
gcode:
  {% if 'xyz' not in printer.toolhead.homed_axes %}
    G28
  {% endif %}
  G90
  G0 X90 Y90 F6000
  G0 Z5 F1000
  M400
  BEACON_QUERY
  G4 P500
  {% set v = printer.beacon.last_value|float %}
  SAVE_VARIABLE VARIABLE=bare_bed_value VALUE={v}
  RESPOND PREFIX="🪪" MSG="Bare-bed baseline saved: {v}"

[gcode_macro CHECK_PLATE]
description: Verify a build plate is installed. Baseline = bare bed reading.
variable_min_delta: 0.25
gcode:
  {% if 'xyz' not in printer.toolhead.homed_axes %}
    G28
  {% endif %}
  G90
  G0 X90 Y90 F6000
  G0 Z5 F1000
  M400
  BEACON_QUERY
  G4 P500
  {% set actual = printer.beacon.last_value|float %}
  {% set baseline = printer.save_variables.variables.bare_bed_value|default(0)|float %}
  {% set min_delta = printer["gcode_macro CHECK_PLATE"].min_delta|float %}
  {% if baseline == 0 %}
    RESPOND TYPE=error MSG="CHECK_PLATE: no baseline saved. Run CALIBRATE_PLATE_CHECK with bare bed first."
    CANCEL_PRINT
  {% else %}
    {% set delta = (actual - baseline)|abs %}
    RESPOND PREFIX="🪪" MSG="Plate check: actual={actual}, bare={baseline}, delta={delta}"
    {% if delta < min_delta %}
      { action_call_remote_method("notify",
          name="gcode_pushover",
          title="🚫 No Plate",
          message="No build plate detected — reading matches bare bed (delta=%.3f)" % delta) }
      CANCEL_PRINT
    {% endif %}
  {% endif %}
